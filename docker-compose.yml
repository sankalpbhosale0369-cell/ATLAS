# ============================================================
# ATLAS — Docker Compose
# One-command deployment for the LangGraph AI Chatbot
# ============================================================

services:
  atlas:
    build: .
    container_name: atlas-chatbot
    ports:
      - "8501:8501"
    env_file:
      - .env
    volumes:
      - atlas-data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  atlas-data:
    driver: local
